function ajaxDownload(){
  var imageUrl = $(".epaper-page-viewer img").prop("src");

           var fileName = imageUrl.split('/').pop().split('?')[0];

            $.ajax({
                url: imageUrl,
                method: 'GET',
                xhrFields: {
                    responseType: 'blob'
                },
                processData: false,
                dataType: '',
                success: function (blob) {
                    var blobUrl = URL.createObjectURL(blob);
                    var link = document.createElement('a');
                    link.href = blobUrl;
                    link.download = fileName; // Use original file name
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(blobUrl);
                },
                error: function (xhr, status, error) {
                    console.error('Download failed:', error);
                }
            });  
}

function canvasDownload(){
var img = $('.epaper-page-viewer img')[0]; // First matching image

            if (!img) {
                alert('No image found in .epaper-page-viewer');
                return;
            }
            
            // Extract filename from src
            var imageUrl = img.src;
            var fileName = imageUrl.split('/').pop().split('?')[0];

            // Create a canvas
            var canvas = document.createElement('canvas');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;

            var ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);

            // Convert canvas to Blob and download
            canvas.toBlob(function (blob) {
                var blobUrl = URL.createObjectURL(blob);
                var link = document.createElement('a');
                link.href = blobUrl;
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(blobUrl);
            });
}
